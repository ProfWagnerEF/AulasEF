<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Turma - Xadrez Escolar</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/data.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
</head>
<body>
    <header id="mainHeader"></header>

    <main class="container" style="max-width:600px">
        <div class="page-header">
            <h1><a href="admin-turmas.html" style="color:var(--text-primary)">&larr;</a> Turma</h1>
        </div>

        <div id="msg"></div>

        <div class="card">
            <form method="POST" action="/api/turmas/form" id="formTurma">
                <input type="hidden" name="_token" id="tokenField" value="">
                <input type="hidden" name="id" id="idField" value="">

                <div class="form-group">
                    <label>Nome da Turma</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Ano Escolar</label>
                    <input type="text" name="ano_escolar" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Turno</label>
                    <select name="turno" class="form-control" required>
                        <option value="manha">Manhã</option>
                        <option value="tarde">Tarde</option>
                        <option value="noite">Noite</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Professor</label>
                    <input type="text" name="professor" class="form-control" required>
                </div>

                <div style="display:flex;gap:8px;margin-top:20px">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="admin-turmas.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            verificarAuth();
            initTheme();
            initHeader();
            document.getElementById('tokenField').value = localStorage.getItem('token') || '';

            var p = new URLSearchParams(window.location.search);
            var id = p.get('id');
            if (id) {
                document.getElementById('idField').value = id;
                document.querySelector('h1').textContent = 'Editar Turma';
                apiGet('/api/turmas/' + id).then(function (t) {
                        document.querySelector('[name="nome"]').value = t.nome || '';
                        document.querySelector('[name="ano_escolar"]').value = t.ano_escolar || '';
                        document.querySelector('[name="turno"]').value = t.turno || '';
                        document.querySelector('[name="professor"]').value = t.professor || '';
                    });
            }
        });
    </script>
</body>
</html>
